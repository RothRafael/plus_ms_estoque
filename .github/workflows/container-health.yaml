name: Container Health Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t plus-ms-estoque .

      - name: Start container
        run: |
          docker run -d \
            --name ms-estoque \
            -p 3000:3000 \
            plus-ms-estoque

      - name: Wait for container to be ready
        run: |
          echo "Waiting for /health..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Container ready (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS"
            sleep 2
          done
          echo "Container did not become ready in time"
          docker logs ms-estoque
          exit 1

      - name: Verify health response
        run: |
          RESPONSE=$(curl -s http://localhost:3000/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"'

      - name: Verify Swagger UI is accessible
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/docs/)
          echo "Swagger UI status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Print container logs on failure
        if: failure()
        run: docker logs ms-estoque

      - name: Stop container
        if: always()
        run: docker rm -f ms-estoque
